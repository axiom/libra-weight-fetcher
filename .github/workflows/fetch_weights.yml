name: Fetch and Append Data to SQLite (Bun)

on:
  schedule:
    - cron: '58 7 * * *' # Run once per day
  workflow_dispatch: # Allows manual triggering of the workflow

permissions:
  contents: write  # We want to push updates to the db

jobs:
  fetch-data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Bun
      uses: oven-sh/setup-bun@v2

    - name: Install dependencies
      run: bun install

    - name: Fetch CSV data from API and update SQLite DB
      env:
        API_TOKEN: ${{ secrets.API_TOKEN }}
      run: bun run bin/fetch-weights.ts

    - name: Write out weights to JSON file
      run: bun run bin/write-json.ts

    - name: Commit changes
      run: |
        git config --local user.name "github-actions[bot]"
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git add weights.db src/weights.json
        git commit -m "Add new weight data" || echo "No changes to commit"
        git push

  generate-advice:
    runs-on: ubuntu-latest
    needs: fetch-data

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        # Pull the latest commit so we get the weights.json written by fetch-data
        ref: ${{ github.ref }}

    - name: Set up Bun
      uses: oven-sh/setup-bun@v2

    - name: Install dependencies
      run: bun install

    - name: Install GitHub Copilot CLI
      run: npm install -g @github/copilot

    - name: Generate daily advice
      env:
        COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
      run: bun run bin/copilot-summary.ts --json > src/advice.json

    - name: Commit advice
      run: |
        git config --local user.name "github-actions[bot]"
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git pull --rebase
        git add src/advice.json
        git commit -m "Update daily advice" || echo "No changes to commit"
        git push
