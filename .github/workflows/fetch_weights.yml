name: Fetch and Append Data to SQLite (Bun)

on:
  schedule:
    - cron: '58 7 * * *' # Run once per day
  workflow_dispatch: # Allows manual triggering of the workflow

concurrency:
  group: fetch-weights-${{ github.ref }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions: {}  # Jobs will specify their own permissions

jobs:
  fetch-data:
    name: Fetch Data
    environment: libra-app
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to push weight data updates to the repo

    steps:
    - name: Checkout repository
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      with:
        persist-credentials: true  # Needed to push weight data updates to the repo

    - name: Set up Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

    - name: Install dependencies
      run: bun install

    - name: Fetch CSV data from API and update SQLite DB
      env:
        API_TOKEN: ${{ secrets.API_TOKEN }}
      run: bun run bin/fetch-weights.ts

    - name: Write out weights to JSON file
      run: bun run bin/write-json.ts

    - name: Commit changes
      run: |
        git config --local user.name "github-actions[bot]"
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git add weights.db src/weights.json
        git commit -m "Add new weight data" || echo "No changes to commit"
        git push

  generate-advice:
    name: Generate Advice
    runs-on: ubuntu-latest
    needs: fetch-data
    environment: copilot
    permissions:
      contents: write  # Needed to push advice updates to the repo

    steps:
    - name: Checkout repository
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      with:
        # Pull the latest commit so we get the weights.json written by fetch-data
        ref: ${{ github.ref }}
        persist-credentials: true  # Needed to push advice updates to the repo

    - name: Set up Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

    - name: Install dependencies
      run: bun install

    - name: Install GitHub Copilot CLI
      run: npm install -g @github/copilot

    - name: Generate daily advice
      env:
        COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
      run: bun run bin/copilot-summary.ts --json > src/advice.json

    - name: Commit advice
      run: |
        git config --local user.name "github-actions[bot]"
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git pull --rebase
        git add src/advice.json
        git commit -m "Update daily advice" || echo "No changes to commit"
        git push
